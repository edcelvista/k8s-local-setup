package_update: true
package_upgrade: true
users:
  - default
  - name: ubuntu
    groups: [sudo]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-rsa  administrator@edcelvista.com
chpasswd:
  list: |
    ubuntu:ubuntu
  expire: False
packages:
  - net-tools
  - python3
  - python3-pip
  - python3-venv
# Run additional commands after setup:
runcmd:
  - echo 'VM setup complete!' > /tmp/cloud-init.log
  # - curl -LsSf https://astral.sh/uv/install.sh | sh